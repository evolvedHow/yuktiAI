name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Build
        run: npm run build
        env:
          # LLM settings — store these as GitHub Secrets (Settings → Secrets → Actions)
          VITE_LLM_BASE_URL:    ${{ secrets.VITE_LLM_BASE_URL }}
          VITE_LLM_API_KEY:     ${{ secrets.VITE_LLM_API_KEY }}
          VITE_LLM_MODEL:       ${{ secrets.VITE_LLM_MODEL }}
          VITE_MAX_TOKENS:      ${{ secrets.VITE_MAX_TOKENS }}
          VITE_TURN_DELAY_MS:   ${{ secrets.VITE_TURN_DELAY_MS }}
          VITE_MAX_TURNS:       ${{ secrets.VITE_MAX_TURNS }}
          # Optional: set this secret to bake a backend URL into the Pages build
          # so users don't need to configure it manually in their browser.
          # Leave unset to ship in pure direct-to-provider mode.
          VITE_BACKEND_URL:     ${{ secrets.VITE_BACKEND_URL }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
